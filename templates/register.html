{% extends "base.html" %}

{% block title %}สมัครสมาชิก - Game Shop{% endblock %}

{% block extra_css %}
<style>
    .auth-form {
        max-width: 400px;
        margin: 2rem auto;
        background: white;
        padding: 2rem;
        border-radius: 10px;
    }

    body.dark .auth-form {
        background-color: #2a2a2a;
    }

    .auth-form h2 {
        text-align: center;
        margin-bottom: 1.5rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: bold;
    }

    .form-group input {
        width: 100%;
        padding: 0.7rem;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 1rem;
    }

    body.dark .form-group input {
        background-color: #333;
        color: white;
        border-color: #555;
    }

    .btn-submit {
        width: 100%;
        padding: 0.8rem;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-submit:hover {
        background: #5568d3;
    }

    .auth-link {
        text-align: center;
        margin-top: 1rem;
    }

    .auth-link a {
        color: #667eea;
        text-decoration: none;
    }

    .auth-link a:hover {
        text-decoration: underline;
    }

    .error {
        color: #e74c3c;
        padding: 0.7rem;
        background: #ffe0e0;
        border-radius: 5px;
        margin-bottom: 1rem;
    }

    body.dark .error {
        background: #5a2c2c;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-form">
    <h2>สมัครสมาชิก</h2>
    
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label for="username">ชื่อผู้ใช้:</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="form-group">
            <label for="email">อีเมล:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="password">รหัสผ่าน:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
            <label for="confirm_password">ยืนยันรหัสผ่าน:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>

        <button type="submit" class="btn-submit">สมัครสมาชิก</button>
    </form>

    <div class="auth-link">
        มีบัญชีแล้ว? <a href="{{ url_for('login') }}">เข้าสู่ระบบ</a>
    </div>
</div>
{% endblock %}
